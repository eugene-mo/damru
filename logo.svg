<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    
    <!-- Drum Gradient -->
    <linearGradient id="drumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    
    <!-- Strings Gradient -->
    <linearGradient id="stringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
  </defs>

  <!-- Dark Background with subtle rounded corners -->
  <rect x="0" y="0" width="200" height="200" rx="40" fill="url(#bgGrad)" />

  <!-- Outer Glow -->
  <circle cx="100" cy="100" r="70" fill="#F59E0B" opacity="0.1" filter="blur(10px)"/>

  <!-- Damru Body -->
  <!-- Top Half -->
  <path d="M 50 40 L 150 40 C 130 75, 110 95, 100 100 C 90 95, 70 75, 50 40 Z" fill="url(#drumGrad)" />
  <!-- Bottom Half -->
  <path d="M 50 160 L 150 160 C 130 125, 110 105, 100 100 C 90 105, 70 125, 50 160 Z" fill="url(#drumGrad)" />

  <!-- Drum Heads -->
  <ellipse cx="100" cy="40" rx="50" ry="12" fill="#FEF3C7" />
  <ellipse cx="100" cy="160" rx="50" ry="12" fill="#FEF3C7" />

  <!-- Center Wrap / Knot -->
  <rect x="85" y="90" width="30" height="20" rx="4" fill="#78350F" />
  <line x1="85" y1="95" x2="115" y2="95" stroke="#FBBF24" stroke-width="2" />
  <line x1="85" y1="105" x2="115" y2="105" stroke="#FBBF24" stroke-width="2" />

  <!-- Decorative Strings on Body -->
  <path d="M 55 45 L 100 90 L 145 45 M 55 155 L 100 110 L 145 155" fill="none" stroke="#FDE68A" stroke-width="2" opacity="0.6" stroke-linejoin="round" />

  <!-- Hanging Strings and Beads -->
  <!-- Left String -->
  <path d="M 85 100 Q 40 100 30 130" fill="none" stroke="url(#stringGrad)" stroke-width="3" stroke-linecap="round" />
  <circle cx="30" cy="130" r="7" fill="#EF4444" />
  <circle cx="30" cy="130" r="3" fill="#FCA5A5" />

  <!-- Right String -->
  <path d="M 115 100 Q 160 100 170 70" fill="none" stroke="url(#stringGrad)" stroke-width="3" stroke-linecap="round" />
  <circle cx="170" cy="70" r="7" fill="#EF4444" />
  <circle cx="170" cy="70" r="3" fill="#FCA5A5" />
  
  <!-- Subtle inner shadow/highlight on the drum heads -->
  <ellipse cx="100" cy="42" rx="45" ry="8" fill="none" stroke="#D97706" stroke-width="2" opacity="0.3" />
  <ellipse cx="100" cy="158" rx="45" ry="8" fill="none" stroke="#D97706" stroke-width="2" opacity="0.3" />
</svg>